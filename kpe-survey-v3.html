window.exportExcel=function(){try{if(typeof XLSX==='undefined') return alert('–ë–Η–±–Μ–Η–Ψ―²–Β–Κ–Α XLSX –Ϋ–Β –Ζ–Α–≥―Ä―É–Ε–Β–Ϋ–Α');if(!S.responses.length) return alert('–ù–Β―² –¥–Α–Ϋ–Ϋ―΄―Ö –¥–Μ―è ―ç–Κ―¹–Ω–Ψ―Ä―²–Α');const wb=XLSX.utils.book_new();const periods=S.periods.slice();const deptIds=[...new Set(S.responses.flatMap(r=>Object.keys(r.answers||{})))].map(Number).sort((a,b)=>a-b);const summary=[['–ü–Β―Ä–Η–Ψ–¥','–ü–Ψ–¥―Ä–Α–Ζ–¥–Β–Μ–Β–Ϋ–Η–Β','–ö–Ψ–Μ-–≤–Ψ –Ψ―²–≤–Β―²–Ψ–≤','–Γ―Ä–Β–¥–Ϋ–Η–Ι –±–Α–Μ–Μ',...CRITERIA,'–Γ―Ä–Α–≤–Ϋ–Β–Ϋ–Η–Β ―¹ –Ω―Ä–Β–¥―΄–¥―É―â–Η–Φ']];periods.forEach((p,idx)=>{const currentResponses=S.responses.filter(r=>Number(r.period_id)===Number(p.id));const prevP=idx>0?periods[idx-1]:null;const prevResponses=prevP?S.responses.filter(r=>Number(r.period_id)===Number(prevP.id)):[];deptIds.forEach(deptId=>{const st=calcDeptStats(currentResponses,deptId);if(!st.count) return;const prev=prevP?calcDeptStats(prevResponses,deptId):null;const delta=prev&&st.avg!=null&&prev.avg!=null?+(st.avg-prev.avg).toFixed(2):'';const dept=S.departments.find(d=>Number(d.id)===deptId);summary.push([p.name,dept?dept.name:`–û―²–¥–Β–Μ #${deptId}`,st.count,st.avg!=null?+st.avg.toFixed(2):'',...st.byQ.map(x=>x.avg!=null?+x.avg.toFixed(2):''),delta])})});const ws1=XLSX.utils.aoa_to_sheet(summary);ws1['!cols']=[{wch:24},{wch:42},{wch:14},{wch:14},...CRITERIA.map(()=>({wch:16})),{wch:18}];XLSX.utils.book_append_sheet(wb,ws1,'–Γ–≤–Ψ–¥–Κ–Α');const dynamics=[['–ü–Ψ–¥―Ä–Α–Ζ–¥–Β–Μ–Β–Ϋ–Η–Β','–ü–Β―Ä–Η–Ψ–¥','–Γ―Ä–Β–¥–Ϋ–Η–Ι –±–Α–Μ–Μ']];deptIds.forEach(deptId=>{const dept=S.departments.find(d=>Number(d.id)===deptId);periods.forEach(p=>{const st=calcDeptStats(S.responses.filter(r=>Number(r.period_id)===Number(p.id)),deptId);if(st.count) dynamics.push([dept?dept.name:`–û―²–¥–Β–Μ #${deptId}`,p.name,st.avg!=null?+st.avg.toFixed(2):''])})});const ws2=XLSX.utils.aoa_to_sheet(dynamics);ws2['!cols']=[{wch:42},{wch:24},{wch:14}];XLSX.utils.book_append_sheet(wb,ws2,'–î–Η–Ϋ–Α–Φ–Η–Κ–Α');const comments=[['–ü–Β―Ä–Η–Ψ–¥','–ü–Ψ–¥―Ä–Α–Ζ–¥–Β–Μ–Β–Ϋ–Η–Β','–ö–Ψ–Φ–Φ–Β–Ϋ―²–Α―Ä–Η–Ι','–î–Α―²–Α']];S.responses.forEach(r=>{Object.keys(r.answers||{}).forEach(k=>{const deptId=Number(k);const a=r.answers[k]&&r.answers[k][4];if(a&&a.text){const dept=S.departments.find(d=>Number(d.id)===deptId);const p=S.periods.find(x=>Number(x.id)===Number(r.period_id));comments.push([p?p.name:'',dept?dept.name:`–û―²–¥–Β–Μ #${deptId}`,a.text,r.created_at?r.created_at.slice(0,10):''])}})});const ws3=XLSX.utils.aoa_to_sheet(comments);ws3['!cols']=[{wch:24},{wch:42},{wch:70},{wch:12}];XLSX.utils.book_append_sheet(wb,ws3,'–ö–Ψ–Φ–Φ–Β–Ϋ―²–Α―Ä–Η–Η');XLSX.writeFile(wb,`KPE_survey_history_${new Date().toISOString().slice(0,10)}.xlsx`);alert('–Λ–Α–Ι–Μ Excel ―¹―³–Ψ―Ä–Φ–Η―Ä–Ψ–≤–Α–Ϋ')}catch(e){console.error(e);alert('–û―à–Η–±–Κ–Α ―ç–Κ―¹–Ω–Ψ―Ä―²–Α: '+e.message)}};
