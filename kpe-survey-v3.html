<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Опрос КПЭ — СТИЛ ТЕХНОЛОДЖИ v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f7f6f2;--surface:#ffffff;--surface2:#f3f0ec;--text:#28251d;--muted:#7a7974;--border:#d4d1ca;--primary:#1a1a18;--success:#437a22;--danger:#a12c7b;--shadow:0 8px 24px rgba(22,20,16,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select,textarea{font:inherit}
.shell{max-width:1100px;margin:0 auto;padding:20px 16px 40px}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
.title{font-size:28px;font-weight:600;letter-spacing:-.02em}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:4px}
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:10px 16px;border:none;background:transparent;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted)}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.h1{font-size:22px;font-weight:600;margin-bottom:8px}
.h2{font-size:17px;font-weight:600;margin-bottom:10px}
.muted{font-size:13px;color:var(--muted)}
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.field{margin-bottom:14px}
label{display:block;font-size:13px;color:#5f5e5a;margin-bottom:6px}
input[type=text],input[type=password],input[type=date],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);outline:none}
textarea{resize:vertical;min-height:84px}
input:focus,select:focus,textarea:focus{border-color:#7a7974}
button{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);cursor:pointer;min-height:42px}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-green{background:var(--success);border-color:var(--success);color:#fff}
.btn-danger{color:var(--danger);border-color:#e3b9d1}
.btn-sm{padding:7px 10px;min-height:36px;font-size:13px}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge-info{background:#e6f1fb;color:#0c447c}
.badge-warn{background:#faeeda;color:#633806}
.badge-ok{background:#eaf3de;color:#27500a}
.alert{padding:10px 12px;border-radius:10px;font-size:14px;margin-bottom:12px}
.alert-ok{background:#eaf3de;color:#27500a}
.alert-err{background:#fcebeb;color:#791f1f}
.alert-warn{background:#faeeda;color:#633806}
.progress{height:6px;background:#dfdcd5;border-radius:999px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary)}
.q-block{margin-bottom:18px}
.q-label{font-size:14px;color:#5f5e5a;margin-bottom:8px}
.score-row{display:flex;gap:6px;flex-wrap:wrap}
.score-btn{width:44px;height:44px;border:1px solid var(--border);border-radius:10px;background:#fff;font-weight:600}
.score-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
.score-btn.na{width:auto;padding:0 12px;font-size:13px}
.sep{height:1px;background:var(--border);margin:16px 0}
.list{display:flex;flex-direction:column;gap:8px}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #ece8e2}
.row:last-child{border-bottom:none}
.kpi{padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--surface2)}
.kpi .v{font-size:28px;font-weight:700;line-height:1}
.kpi .l{font-size:12px;color:var(--muted);margin-top:6px}
.table-wrap{overflow:auto}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px 8px;border-bottom:1px solid #ece8e2;text-align:left;font-size:14px;vertical-align:top}
.table th{font-size:12px;color:var(--muted);font-weight:600}
.delta.up{color:var(--success);font-weight:700}
.delta.down{color:#b34b4b;font-weight:700}
.delta.flat{color:var(--muted);font-weight:700}
.sparkline{width:100%;height:56px;display:block}
.spark-wrap{padding:10px 0 2px}
.spark-meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px;margin-top:6px}
.code-box{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:22px;font-weight:700;letter-spacing:4px;padding:12px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:inline-block;cursor:pointer}
.dept-list{max-height:240px;overflow:auto;border:1px solid var(--border);border-radius:10px;padding:8px;background:#fff}
.dept-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border-radius:8px}
.dept-item:hover{background:#f7f6f2}
.dept-pick{cursor:pointer}
.dept-pick.selected{background:#e6f1fb;color:#0c447c}
.small{font-size:12px}
@media (max-width: 900px){.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <div id="app">Загрузка...</div>
</div>

<script>
const SUPABASE_URL = 'https://cvaeztimgfdllcwbzxmk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2ugrqwNDSugXvGY8T3Dthw_0mWvg60u';
const ADMIN_PASS = 'steel2024';
const CONFIGURED = true;

const CRITERIA = [
  'Отзывчивость, доброжелательность, радушие',
  'Качество оказания услуг коллегам',
  'Оказание помощи смежным подразделениям при решении задач',
  'Оперативность оказания услуг коллегам'
];

const headers = () => ({
  'Content-Type':'application/json',
  'apikey':SUPABASE_ANON_KEY,
  'Authorization':'Bearer ' + SUPABASE_ANON_KEY
});

async function sbGet(table, filters='') {
  const tail = filters ? `?${filters}` : '';
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${tail}`, { headers: headers() });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{ ...headers(), 'Prefer':'return=representation' },
    body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbPatch(table, filters, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filters}`, {
    method:'PATCH',
    headers:{ ...headers(), 'Prefer':'return=representation' },
    body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbDelete(table, filters) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filters}`, {
    method:'DELETE',
    headers:headers()
  });
  if (!r.ok) throw new Error(await r.text());
}

function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function genCode(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='';
  for(let i=0;i<5;i++) c+=ch[Math.floor(Math.random()*ch.length)];
  return c;
}

function doneKey(code,periodId){ return `sv_done_${periodId}_${code}`; }
function markDone(code,periodId){ try{ localStorage.setItem(doneKey(code,periodId),'1'); }catch(e){} }
function isDone(code,periodId){ try{ return !!localStorage.getItem(doneKey(code,periodId)); }catch(e){ return false; } }

let S = {
  tab:'survey',
  adminAuth:false,
  loading:true,
  groups:[],
  periods:[],
  departments:[],
  responses:[],
  step:0,
  code:'',
  currentGroup:null,
  deptIdx:0,
  answers:{},
  saving:false,
  surveyMsg:'',
  adminMsg:'',
  adminErr:'',
  deptFilter:'',
  newGroupName:'',
  newGroupDeptIds:[],
  newGroupPeriodId:'',
  newDeptName:'',
  newPeriodName:'',
  newPeriodCode:'',
  newPeriodFrom:'',
  newPeriodTo:'',
  resultPeriodId:'',
  comparePeriodId:'',
  resultDeptId:'',
  resultLoading:false
};

async function loadAll(){
  try{
    const [periods, departments, groups] = await Promise.all([
      sbGet('survey_periods','select=*&order=date_from.asc.nullslast,created_at.asc'),
      sbGet('departments','select=*&order=is_active.desc,name.asc'),
      sbGet('sv_groups_v2','select=*&order=created_at.asc')
    ]);
    S.periods = periods;
    S.departments = departments;
    S.groups = groups;
    const active = S.periods.find(x=>x.is_active) || S.periods[0] || null;
    if(active){
      S.resultPeriodId = String(active.id);
      if(!S.newGroupPeriodId) S.newGroupPeriodId = String(active.id);
    }
  }catch(e){
    console.error(e);
  }
  S.loading = false;
  render();
}

async function loadResponses(){
  S.resultLoading = true;
  render();
  try{
    S.responses = await sbGet('sv_responses_v2','select=*&order=created_at.asc');
  }catch(e){
    console.error(e);
  }
  S.resultLoading = false;
  render();
}

function render(){
  document.getElementById('app').innerHTML = buildHtml();
}

function buildHtml(){
  if(S.loading) return '<div class="card">Загрузка...</div>';

  return `
    <div class="topbar">
      <div>
        <div class="subtitle">ООО «СТИЛ ТЕХНОЛОДЖИ» · Оценка подразделений</div>
        <div class="title">Опрос компетенций подразделений</div>
      </div>
    </div>

    <div class="tabs">
      ${mkTab('survey','Пройти опрос')}
      ${S.adminAuth ? mkTab('results','Результаты') : ''}
      ${mkTab('admin', S.adminAuth ? 'Администрирование' : 'Войти')}
    </div>

    ${S.tab==='survey' ? renderSurvey() : S.tab==='results' ? renderResults() : renderAdmin()}
  `;
}

function mkTab(id,label){
  return `<button class="tab${S.tab===id?' active':''}" onclick="setTab('${id}')">${label}</button>`;
}

function renderSurvey(){
  if(S.step===0) return renderSurveyCode();
  if(S.step===1) return renderSurveyQuestions();
  return renderSurveyDone();
}

function renderSurveyCode(){
  const code = S.code.trim().toUpperCase();
  const g = S.groups.find(x=>x.code===code);
  const already = g ? isDone(code,g.period_id) : false;

  return `
    <div class="card">
      <div class="h1">Введите код группы</div>
      <div class="muted" style="margin-bottom:14px">Код выдаёт организатор опроса</div>
      ${S.surveyMsg ? `<div class="alert alert-err">${esc(S.surveyMsg)}</div>` : ''}
      <div class="field">
        <input
          type="text"
          maxlength="6"
          value="${esc(S.code)}"
          placeholder="Например: AB3K7"
          style="font-size:20px;letter-spacing:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;text-transform:uppercase"
          oninput="S.code=this.value.toUpperCase();render()"
          onkeydown="if(event.key==='Enter')submitCode()"
        >
      </div>
      ${already ? '<div class="alert alert-warn">Вы уже проходили опрос по этому коду.</div>' : ''}
      <button class="btn-primary" style="width:100%" onclick="submitCode()" ${already?'disabled':''}>Продолжить</button>
    </div>

    <div class="card">
      <span class="badge badge-warn">Анонимно</span>
      <div class="muted" style="margin-top:10px">
        Ответы сохраняются без имени пользователя. Ограничение повторного прохождения работает на этом устройстве.
      </div>
    </div>
  `;
}

function renderSurveyQuestions(){
  const g = S.currentGroup;
  if(!g) return '';

  const deptIds = Array.isArray(g.dept_ids) ? g.dept_ids : [];
  const deptId = deptIds[S.deptIdx];
  const dept = S.departments.find(d=>String(d.id)===String(deptId));
  const deptName = dept ? dept.name : `Отдел #${deptId}`;
  const total = deptIds.length;
  const pct = Math.round(S.deptIdx / Math.max(total,1) * 100);
  const feedbackAnswer = (S.answers[deptId] || {})[4];

  return `
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span class="muted">Подразделение ${S.deptIdx+1} из ${total}</span>
      <span class="muted">${pct}%</span>
    </div>
    <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>

    ${S.surveyMsg ? `<div class="alert alert-err">${esc(S.surveyMsg)}</div>` : ''}

    <div class="card">
      <span class="badge badge-warn">Анонимно</span>
      <div class="h2" style="margin-top:12px;margin-bottom:18px">
        Оцените отдел: <span style="color:#533ab7">${esc(deptName)}</span>
      </div>

      ${CRITERIA.map((c,qi)=>{
        const a = (S.answers[deptId] || {})[qi] || {};
        return `
          <div class="q-block">
            <div class="q-label">${qi+1}. ${esc(c)}</div>
            <div class="score-row">
              ${[1,2,3,4,5].map(n=>`
                <button class="score-btn${a.score===n?' sel':''}" onclick="setScore('${deptId}',${qi},${n})">${n}</button>
              `).join('')}
              <button class="score-btn na${a.score===0?' sel':''}" onclick="setScore('${deptId}',${qi},0)">Не взаимодействую</button>
            </div>
          </div>
        `;
      }).join('')}

      <div class="sep"></div>

      <div class="q-block">
        <div class="q-label">5. Пожелания и рекомендации <span style="color:#a12c7b">*</span></div>
        <textarea placeholder="Введите пожелания и рекомендации" oninput="setText('${deptId}',4,this.value)">${esc(feedbackAnswer ? feedbackAnswer.text : '')}</textarea>
      </div>

      <div class="sep"></div>

      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
        ${S.deptIdx>0 ? '<button onclick="prevDept()">← Назад</button>' : '<span></span>'}
        ${S.deptIdx<total-1
          ? '<button class="btn-primary" onclick="nextDept()">Следующий отдел →</button>'
          : `<button class="btn-primary" onclick="submitSurvey()" ${S.saving?'disabled':''}>${S.saving?'Сохраняем...':'Отправить ответы ✓'}</button>`
        }
      </div>
    </div>
  `;
}

function renderSurveyDone(){
  const g = S.currentGroup;
  return `
    <div class="card" style="text-align:center;padding:36px 24px">
      <div style="width:68px;height:68px;border-radius:999px;background:#eaf3de;color:#27500a;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px">✓</div>
      <div class="h1">Спасибо за прохождение опроса</div>
      <div style="color:#5f5e5a;margin-bottom:8px">Ваши ответы успешно сохранены.</div>
      <div class="muted">Оценено подразделений: ${g && Array.isArray(g.dept_ids) ? g.dept_ids.length : 0}</div>
    </div>
  `;
}

function avg(arr){
  return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
}

function calcDeptStats(responses,deptId){
  const byQ = CRITERIA.map((_,qi)=>{
    const scores = responses.flatMap(r=>{
      const da = r.answers && r.answers[String(deptId)];
      if(!da || !da[qi] || da[qi].score===0 || da[qi].score==null) return [];
      return [Number(da[qi].score)];
    });

    const na = responses.filter(r=>{
      const da = r.answers && r.answers[String(deptId)];
      return !!(da && da[qi] && Number(da[qi].score)===0);
    }).length;

    return {
      avg: scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null,
      count: scores.length,
      na
    };
  });

  const vals = byQ.map(x=>x.avg).filter(v=>v!=null);
  const count = responses.filter(r=>r.answers && r.answers[String(deptId)]).length;

  return {
    avg: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null,
    count,
    byQ
  };
}

function fmtDelta(v){
  if(v==null) return '—';
  const s = v>0 ? '+' : '';
  return s + v.toFixed(2);
}

function deltaClass(v){
  if(v==null) return 'delta flat';
  if(v>0.001) return 'delta up';
  if(v<-0.001) return 'delta down';
  return 'delta flat';
}

function renderResults(){
  if(S.resultLoading) return '<div class="card">Загрузка ответов...</div>';

  const periods = S.periods;
  const currentPeriodId = Number(S.resultPeriodId || 0);
  const comparePeriodId = Number(S.comparePeriodId || 0);

  const currentResponses = S.responses.filter(r=>Number(r.period_id)===currentPeriodId);
  const compareResponses = comparePeriodId ? S.responses.filter(r=>Number(r.period_id)===comparePeriodId) : [];

  const deptIds = [...new Set(S.responses.flatMap(r=>Object.keys(r.answers || {})))].map(Number).sort((a,b)=>a-b);

  const stats = deptIds.map(deptId=>{
    const cur = calcDeptStats(currentResponses,deptId);
    const prev = comparePeriodId ? calcDeptStats(compareResponses,deptId) : null;
    return {
      deptId,
      cur,
      prev,
      delta:(cur.avg!=null && prev && prev.avg!=null) ? cur.avg - prev.avg : null
    };
  }).filter(x=>x.cur.count || (x.prev && x.prev.count));

  const totalCurrent = currentResponses.length;
  const avgCurrent = avg(stats.map(x=>x.cur.avg).filter(v=>v!=null));
  const avgPrev = avg(stats.map(x=>x.prev && x.prev.avg!=null ? x.prev.avg : null).filter(v=>v!=null));
  const overallDelta = (avgCurrent!=null && avgPrev!=null) ? avgCurrent - avgPrev : null;
  const selId = Number(S.resultDeptId || 0);

  return `
    <div class="card">
      <div class="grid grid-3" style="margin-bottom:16px">
        <div class="field">
          <label>Период</label>
          <select onchange="S.resultPeriodId=this.value;render()">
            ${periods.map(p=>`<option value="${p.id}" ${String(p.id)===String(S.resultPeriodId)?'selected':''}>${esc(p.name)}</option>`).join('')}
          </select>
        </div>

        <div class="field">
          <label>Сравнить с</label>
          <select onchange="S.comparePeriodId=this.value;render()">
            <option value="">Без сравнения</option>
            ${periods.filter(p=>String(p.id)!==String(S.resultPeriodId)).map(p=>`<option value="${p.id}" ${String(p.id)===String(S.comparePeriodId)?'selected':''}>${esc(p.name)}</option>`).join('')}
          </select>
        </div>

        <div class="field">
          <label>Действия</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn-sm" onclick="loadResponses()">Обновить</button>
            <button class="btn-green btn-sm" onclick="exportExcel()">Экспорт Excel</button>
          </div>
        </div>
      </div>

      <div class="grid grid-3">
        <div class="kpi">
          <div class="v">${totalCurrent}</div>
          <div class="l">Ответов в выбранном периоде</div>
        </div>
        <div class="kpi">
          <div class="v">${avgCurrent!=null ? avgCurrent.toFixed(2) : '—'}</div>
          <div class="l">Средний балл периода</div>
        </div>
        <div class="kpi">
          <div class="v ${deltaClass(overallDelta)}">${fmtDelta(overallDelta)}</div>
          <div class="l">Динамика к периоду сравнения</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="h2">Сводка по подразделениям</div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Подразделение</th>
              <th>Ответов</th>
              <th>Средний балл</th>
              <th>Динамика</th>
            </tr>
          </thead>
          <tbody>
            ${stats.sort((a,b)=>(b.cur.avg||0)-(a.cur.avg||0)).map(s=>{
              const dept = S.departments.find(d=>Number(d.id)===Number(s.deptId));
              return `
                <tr onclick="selectDept('${s.deptId}')" style="cursor:pointer">
                  <td>${esc(dept ? dept.name : 'Отдел #' + s.deptId)}</td>
                  <td>${s.cur.count}</td>
                  <td>${s.cur.avg!=null ? s.cur.avg.toFixed(2) : '—'}</td>
                  <td><span class="${deltaClass(s.delta)}">${fmtDelta(s.delta)}</span></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    ${selId ? renderDeptDetails(selId,currentResponses,compareResponses) : ''}
  `;
}

function getDeptTrend(deptId){
  const points = S.periods.map(p=>{
    const rs = S.responses.filter(r=>Number(r.period_id)===Number(p.id));
    const st = calcDeptStats(rs,deptId);
    return {label:p.name,value:st.avg,count:st.count};
  }).filter(x=>x.count && x.value!=null);

  return {
    points,
    firstLabel: points.length ? points[0].label : '',
    lastLabel: points.length ? points[points.length-1].label : ''
  };
}

function renderSparkline(points){
  if(!points.length) return '';

  const width=520, height=56, pad=6;
  const vals=points.map(p=>Number(p.value));
  const min=Math.min(...vals), max=Math.max(...vals), span=(max-min)||1;
  const step=points.length===1?0:(width-pad*2)/(points.length-1);

  const coords=points.map((p,i)=>{
    const x=pad+step*i;
    const y=height-pad-((Number(p.value)-min)/span)*(height-pad*2);
    return {x,y,v:Number(p.value),label:p.label};
  });

  const poly=coords.map(c=>`${c.x},${c.y}`).join(' ');
  const last=coords[coords.length-1], first=coords[0];
  const area=`${pad},${height-pad} ` + coords.map(c=>`${c.x},${c.y}`).join(' ') + ` ${last.x},${height-pad}`;
  const color=(last.v-first.v)>0.001 ? '#437a22' : (last.v-first.v)<-0.001 ? '#b34b4b' : '#7a7974';

  return `
    <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="Мини-график динамики">
      <polyline points="${area}" fill="rgba(1,105,111,0.08)"></polyline>
      <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
      ${coords.map((c,i)=>`
        <circle cx="${c.x}" cy="${c.y}" r="${i===coords.length-1?3.5:2.5}" fill="${color}">
          <title>${esc(c.label)}: ${c.v.toFixed(2)}</title>
        </circle>
      `).join('')}
    </svg>
  `;
}

function renderDeptDetails(deptId,currentResponses,compareResponses){
  const dept=S.departments.find(d=>Number(d.id)===Number(deptId));
  const cur=calcDeptStats(currentResponses,deptId);
  const prev=compareResponses.length ? calcDeptStats(compareResponses,deptId) : null;
  const trend=getDeptTrend(deptId);

  const comments=currentResponses.flatMap(r=>{
    const da=r.answers && r.answers[String(deptId)];
    if(da && da[4] && da[4].text) return [{text:da[4].text,date:r.created_at?r.created_at.slice(0,10):''}];
    return [];
  });

  return `
    <div class="card">
      <div class="h2">${esc(dept ? dept.name : 'Отдел #' + deptId)}</div>
      <div class="muted" style="margin-bottom:12px">Ответов: ${cur.count}</div>

      ${trend.points.length ? `
        <div class="sep"></div>
        <div class="h2">Динамика по периодам</div>
        <div class="spark-wrap">
          ${renderSparkline(trend.points)}
          <div class="spark-meta">
            <span>${esc(trend.firstLabel)}</span>
            <span>${esc(trend.lastLabel)}</span>
          </div>
        </div>
      ` : ''}

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Критерий</th>
              <th>Текущий период</th>
              <th>Период сравнения</th>
              <th>Δ</th>
            </tr>
          </thead>
          <tbody>
            ${CRITERIA.map((c,qi)=>{
              const c1=cur.byQ[qi];
              const c2=prev?prev.byQ[qi]:null;
              const d=c1.avg!=null && c2 && c2.avg!=null ? c1.avg-c2.avg : null;
              return `
                <tr>
                  <td>${esc(c)}</td>
                  <td>${c1.avg!=null ? c1.avg.toFixed(2) : '—'} <span class="small muted">(${c1.count} оценок${c1.na ? `, ${c1.na} не взаимодействую` : ''})</span></td>
                  <td>${c2 && c2.avg!=null ? c2.avg.toFixed(2) : '—'}</td>
                  <td><span class="${deltaClass(d)}">${fmtDelta(d)}</span></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>

      ${comments.length ? `
        <div class="sep"></div>
        <div class="h2">Пожелания и рекомендации</div>
        <div class="list">
          ${comments.map(c=>`
            <div class="row">
              <div>${esc(c.text)}</div>
              <div class="muted">${esc(c.date)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

window.setTab=function(t){
  if(t==='results' && !S.adminAuth){
    S.tab='admin';
    render();
    return;
  }
  S.tab=t;
  if(t==='results') loadResponses();
  else render();
};

window.submitCode=function(){
  const code=S.code.trim().toUpperCase();
  const g=S.groups.find(x=>x.code===code);
  if(!g){
    S.surveyMsg='Группа с таким кодом не найдена';
    render();
    return;
  }
  if(isDone(code,g.period_id)){
    S.surveyMsg='Вы уже прошли этот опрос';
    render();
    return;
  }
  S.currentGroup=g;
  S.deptIdx=0;
  S.answers={};
  S.step=1;
  S.surveyMsg='';
  render();
};

window.setScore=function(deptId,qi,score){
  if(!S.answers[deptId]) S.answers[deptId]={};
  if(!S.answers[deptId][qi]) S.answers[deptId][qi]={score:null,text:''};
  S.answers[deptId][qi].score=score;
  S.surveyMsg='';
  render();
};

window.setText=function(deptId,qi,text){
  if(!S.answers[deptId]) S.answers[deptId]={};
  if(!S.answers[deptId][qi]) S.answers[deptId][qi]={score:null,text:''};
  S.answers[deptId][qi].text=text;
};

function validateDeptAnswers(){
  const g=S.currentGroup;
  const deptId=(g.dept_ids||[])[S.deptIdx];

  for(let qi=0;qi<CRITERIA.length;qi++){
    const a=(S.answers[deptId]||{})[qi];
    if(!a || a.score===null){
      S.surveyMsg=`Ответьте на вопрос ${qi+1}`;
      render();
      return false;
    }
  }

  const fb=(S.answers[deptId]||{})[4];
  if(!fb || !fb.text || !fb.text.trim()){
    S.surveyMsg='Заполните поле "Пожелания и рекомендации"';
    render();
    return false;
  }

  S.surveyMsg='';
  return true;
}

window.nextDept=function(){
  if(!validateDeptAnswers()) return;
  S.deptIdx++;
  render();
  window.scrollTo(0,0);
};

window.prevDept=function(){
  S.deptIdx--;
  render();
  window.scrollTo(0,0);
};

window.submitSurvey=async function(){
  if(!validateDeptAnswers()) return;
  S.saving=true;
  render();

  try{
    await sbInsert('sv_responses_v2', [{
      period_id:S.currentGroup.period_id,
      group_code:S.currentGroup.code,
      group_name:S.currentGroup.name,
      answers:S.answers
    }]);
    markDone(S.currentGroup.code,S.currentGroup.period_id);
    S.saving=false;
    S.step=2;
    render();
  }catch(e){
    console.error(e);
    S.saving=false;
    S.surveyMsg='Ошибка при сохранении. Проверьте интернет и попробуйте снова.';
    render();
  }
};

window.checkPass=function(){
  const p=document.getElementById('passInput').value;
  if(p===ADMIN_PASS){
    S.adminAuth=true;
    S.adminErr='';
    S.tab='admin';
    render();
  }else{
    S.adminErr='Неверный пароль';
    render();
  }
};

window.logoutAdmin=function(){
  S.adminAuth=false;
  S.tab='survey';
  render();
};

window.createPeriod=async function(){
  if(!S.newPeriodName.trim() || !S.newPeriodCode.trim()) return alert('Укажите название и код периода');
  try{
    await sbInsert('survey_periods', [{
      name:S.newPeriodName.trim(),
      code:S.newPeriodCode.trim(),
      date_from:S.newPeriodFrom || null,
      date_to:S.newPeriodTo || null,
      is_active:false
    }]);
    S.newPeriodName='';
    S.newPeriodCode='';
    S.newPeriodFrom='';
    S.newPeriodTo='';
    await loadAll();
    S.adminMsg='Период создан';
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.activatePeriod=async function(id){
  try{
    await sbPatch('survey_periods','id=neq.0',{is_active:false});
    await sbPatch('survey_periods',`id=eq.${id}`,{is_active:true});
    await loadAll();
    S.adminMsg='Активный период обновлён';
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.createDepartment=async function(){
  if(!S.newDeptName.trim()) return alert('Введите название отдела');
  try{
    await sbInsert('departments', [{name:S.newDeptName.trim(),is_active:true}]);
    S.newDeptName='';
    await loadAll();
    S.adminMsg='Отдел добавлен';
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.renameDepartment=async function(id,value){
  const name=String(value||'').trim();
  if(!name) return alert('Название не может быть пустым');
  try{
    await sbPatch('departments',`id=eq.${id}`,{name});
    await loadAll();
    S.adminMsg='Название отдела обновлено';
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.toggleDepartment=async function(id,flag){
  try{
    await sbPatch('departments',`id=eq.${id}`,{is_active:flag});
    await loadAll();
    S.adminMsg=flag ? 'Отдел включён' : 'Отдел скрыт';
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.toggleDeptPick=function(id){
  const i=S.newGroupDeptIds.indexOf(id);
  if(i===-1) S.newGroupDeptIds.push(id);
  else S.newGroupDeptIds.splice(i,1);
  render();
};

window.createGroup=async function(){
  const name=S.newGroupName.trim();
  const periodId=Number(S.newGroupPeriodId||0);

  if(!name) return alert('Введите название группы');
  if(!periodId) return alert('Выберите период');
  if(!S.newGroupDeptIds.length) return alert('Выберите отделы');

  const code=genCode();

  try{
    await sbInsert('sv_groups_v2', [{
      code,
      name,
      period_id:periodId,
      dept_ids:S.newGroupDeptIds
    }]);
    S.newGroupName='';
    S.newGroupDeptIds=[];
    await loadAll();
    S.adminMsg=`Группа создана. Код: ${code}`;
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.deleteGroup=async function(id){
  if(!confirm('Удалить группу?')) return;
  try{
    await sbDelete('sv_groups_v2',`id=eq.${id}`);
    await loadAll();
    S.adminMsg='Группа удалена';
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.copyCode=function(code){
  navigator.clipboard.writeText(code).then(()=>{
    S.adminMsg=`Код ${code} скопирован`;
    render();
  });
};

window.selectDept=function(id){
  S.resultDeptId = String(S.resultDeptId)===String(id) ? '' : String(id);
  render();
};

window.exportExcel=function(){
  try{
    if(typeof XLSX==='undefined') return alert('Библиотека XLSX не загружена');
    if(!S.responses.length) return alert('Нет данных для экспорта');

    const wb=XLSX.utils.book_new();
    const periods=S.periods.slice();
    const deptIds=[...new Set(S.responses.flatMap(r=>Object.keys(r.answers||{})))].map(Number).sort((a,b)=>a-b);

    const summary=[['Период','Подразделение','Кол-во ответов','Средний балл',...CRITERIA,'Сравнение с предыдущим']];
    periods.forEach((p,idx)=>{
      const currentResponses=S.responses.filter(r=>Number(r.period_id)===Number(p.id));
      const prevP=idx>0 ? periods[idx-1] : null;
      const prevResponses=prevP ? S.responses.filter(r=>Number(r.period_id)===Number(prevP.id)) : [];

      deptIds.forEach(deptId=>{
        const st=calcDeptStats(currentResponses,deptId);
        if(!st.count) return;
        const prev=prevP ? calcDeptStats(prevResponses,deptId) : null;
        const delta=prev && st.avg!=null && prev.avg!=null ? +(st.avg-prev.avg).toFixed(2) : '';
        const dept=S.departments.find(d=>Number(d.id)===deptId);

        summary.push([
          p.name,
          dept ? dept.name : `Отдел #${deptId}`,
          st.count,
          st.avg!=null ? +st.avg.toFixed(2) : '',
          ...st.byQ.map(x=>x.avg!=null ? +x.avg.toFixed(2) : ''),
          delta
        ]);
      });
    });

    const ws1=XLSX.utils.aoa_to_sheet(summary);
    ws1['!cols']=[{wch:24},{wch:42},{wch:14},{wch:14},...CRITERIA.map(()=>({wch:16})),{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws1,'Сводка');

    const dynamics=[['Подразделение','Период','Средний балл']];
    deptIds.forEach(deptId=>{
      const dept=S.departments.find(d=>Number(d.id)===deptId);
      periods.forEach(p=>{
        const st=calcDeptStats(S.responses.filter(r=>Number(r.period_id)===Number(p.id)),deptId);
        if(st.count){
          dynamics.push([
            dept ? dept.name : `Отдел #${deptId}`,
            p.name,
            st.avg!=null ? +st.avg.toFixed(2) : ''
          ]);
        }
      });
    });

    const ws2=XLSX.utils.aoa_to_sheet(dynamics);
    ws2['!cols']=[{wch:42},{wch:24},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws2,'Динамика');

    const comments=[['Период','Подразделение','Комментарий','Дата']];
    S.responses.forEach(r=>{
      Object.keys(r.answers||{}).forEach(k=>{
        const deptId=Number(k);
        const a=r.answers[k] && r.answers[k][4];
        if(a && a.text){
          const dept=S.departments.find(d=>Number(d.id)===deptId);
          const p=S.periods.find(x=>Number(x.id)===Number(r.period_id));
          comments.push([
            p ? p.name : '',
            dept ? dept.name : `Отдел #${deptId}`,
            a.text,
            r.created_at ? r.created_at.slice(0,10) : ''
          ]);
        }
      });
    });

    const ws3=XLSX.utils.aoa_to_sheet(comments);
    ws3['!cols']=[{wch:24},{wch:42},{wch:70},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws3,'Комментарии');

    XLSX.writeFile(wb,`KPE_survey_history_${new Date().toISOString().slice(0,10)}.xlsx`);
    alert('Файл Excel сформирован');
  }catch(e){
    console.error(e);
    alert('Ошибка экспорта: ' + e.message);
  }
};
