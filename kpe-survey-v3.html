<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Опрос КПЭ — периоды и история</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <style>
    :root{--bg:#f7f6f2;--surface:#ffffff;--surface2:#f3f0ec;--text:#28251d;--muted:#7a7974;--border:#d4d1ca;--primary:#1a1a18;--success:#437a22;--danger:#a12c7b;--shadow:0 8px 24px rgba(22,20,16,.06)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    button,input,select,textarea{font:inherit}
    .shell{max-width:1100px;margin:0 auto;padding:20px 16px 40px}
    .topbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
    .title{font-size:28px;font-weight:600;letter-spacing:-.02em}.subtitle{font-size:13px;color:var(--muted);margin-bottom:4px}
    .tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
    .tab{padding:10px 16px;border:none;background:transparent;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted)}
    .tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
    .h1{font-size:22px;font-weight:600;margin-bottom:8px}.h2{font-size:17px;font-weight:600;margin-bottom:10px}.muted{font-size:13px;color:var(--muted)}
    .grid{display:grid;gap:14px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .field{margin-bottom:14px}label{display:block;font-size:13px;color:#5f5e5a;margin-bottom:6px}
    input[type=text],input[type=password],input[type=date],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);outline:none}
    textarea{resize:vertical;min-height:84px}input:focus,select:focus,textarea:focus{border-color:#7a7974}
    button{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);cursor:pointer;min-height:42px}
    button:disabled{opacity:.5;cursor:not-allowed}.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn-green{background:var(--success);border-color:var(--success);color:#fff}
    .btn-danger{color:var(--danger);border-color:#e3b9d1}.btn-sm{padding:7px 10px;min-height:36px;font-size:13px}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge-info{background:#e6f1fb;color:#0c447c}.badge-warn{background:#faeeda;color:#633806}.badge-ok{background:#eaf3de;color:#27500a}
    .alert{padding:10px 12px;border-radius:10px;font-size:14px;margin-bottom:12px}.alert-ok{background:#eaf3de;color:#27500a}.alert-err{background:#fcebeb;color:#791f1f}.alert-warn{background:#faeeda;color:#633806}
    .progress{height:6px;background:#dfdcd5;border-radius:999px;margin-bottom:16px;overflow:hidden}.progress-fill{height:100%;background:var(--primary)}
    .q-block{margin-bottom:18px}.q-label{font-size:14px;color:#5f5e5a;margin-bottom:8px}.score-row{display:flex;gap:6px;flex-wrap:wrap}
    .score-btn{width:44px;height:44px;border:1px solid var(--border);border-radius:10px;background:#fff;font-weight:600}.score-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary)}.score-btn.na{width:auto;padding:0 12px;font-size:13px}
    .sep{height:1px;background:var(--border);margin:16px 0}.list{display:flex;flex-direction:column;gap:8px}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #ece8e2}.row:last-child{border-bottom:none}
    .kpi{padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--surface2)}.kpi .v{font-size:28px;font-weight:700;line-height:1}.kpi .l{font-size:12px;color:var(--muted);margin-top:6px}
    .table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px 8px;border-bottom:1px solid #ece8e2;text-align:left;font-size:14px;vertical-align:top}.table th{font-size:12px;color:var(--muted);font-weight:600}
    .delta.up{color:var(--success);font-weight:700}.delta.down{color:#b34b4b;font-weight:700}.delta.flat{color:var(--muted);font-weight:700}
    .sparkline{width:100%;height:56px;display:block}.spark-wrap{padding:10px 0 2px}.spark-meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px;margin-top:6px}
    .code-box{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:22px;font-weight:700;letter-spacing:4px;padding:12px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:inline-block;cursor:pointer}
    .dept-list{max-height:240px;overflow:auto;border:1px solid var(--border);border-radius:10px;padding:8px;background:#fff}.dept-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border-radius:8px}.dept-item:hover{background:#f7f6f2}.dept-pick{cursor:pointer}.dept-pick.selected{background:#e6f1fb;color:#0c447c}
    .small{font-size:12px}.danger-zone{border:1px dashed #d8b0c9;background:#fff8fc}
    @media (max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
  </style>
</head>

<div class="shell"><div id="app"></div></div>
<script>
const SUPABASE_URL = 'https://cvaeztimgfdllcwbzxmk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2ugrqwNDSugXvGY8T3Dthw_0mWvg60u';
const ADMIN_PASS = 'steel2024';
const CONFIGURED = SUPABASE_URL && SUPABASE_URL !== 'PASTE_SUPABASE_URL' && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== 'PASTE_SUPABASE_ANON_KEY';

const CRITERIA = [
  'Отзывчивость, доброжелательность, радушие',
  'Качество оказания услуг коллегам',
  'Оказание помощи смежным подразделениям при решении задач',
  'Оперативность оказания услуг коллегам'
];

const headers = () => ({
  'Content-Type':'application/json',
  'apikey':SUPABASE_ANON_KEY,
  'Authorization':'Bearer ' + SUPABASE_ANON_KEY
});

async function sbGet(table, filters=''){
  const tail = filters ? '?' + filters : '';
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${tail}`, {headers: headers()});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInsert(table, data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{...headers(),'Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbPatch(table, filters, data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filters}`, {
    method:'PATCH',
    headers:{...headers(),'Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbDelete(table, filters){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filters}`, {
    method:'DELETE',
    headers:headers()
  });
  if(!r.ok) throw new Error(await r.text());
}

function esc(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function genCode(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='';
  for(let i=0;i<5;i++) c+=ch[Math.floor(Math.random()*ch.length)];
  return c;
}

function doneKey(code, periodId){ return `sv_done_${periodId}_${code}`; }
function markDone(code, periodId){ try{ localStorage.setItem(doneKey(code, periodId),'1'); }catch(e){} }
function isDone(code, periodId){ try{ return !!localStorage.getItem(doneKey(code, periodId)); }catch(e){ return false; } }

function clearSurveyLocalMarks(){
  try{
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k && k.startsWith('sv_done_')) keys.push(k);
    }
    keys.forEach(k=>localStorage.removeItem(k));
    return keys.length;
  }catch(e){ return 0; }
}

let S = {
  tab:'survey',
  adminAuth:false,
  loading:true,
  groups:[],
  allGroups:[],
  periods:[],
  departments:[],
  responses:[],
  step:0,
  code:'',
  currentGroup:null,
  deptIdx:0,
  answers:{},
  saving:false,
  surveyMsg:'',
  adminMsg:'',
  adminErr:'',
  deptFilter:'',
  newGroupName:'',
  newGroupDeptIds:[],
  newGroupPeriodId:'',
  newDeptName:'',
  resultPeriodId:'',
  comparePeriodId:'',
  resultDeptId:'',
  resultLoading:false
};

function getActivePeriod(){ return S.periods.find(x=>x.is_active) || null; }
function getPeriodById(id){ return S.periods.find(p=>Number(p.id)===Number(id)) || null; }

function sortPeriods(ps){
  return [...ps].sort((a,b)=>{
    const da=a.date_from||'', db=b.date_from||'';
    if(da&&db&&da!==db) return da<db?-1:1;
    if(da&&!db) return -1;
    if(!da&&db) return 1;
    const ca=String(a.code||''), cb=String(b.code||'');
    if(ca!==cb) return ca<cb?-1:1;
    return Number(a.id)-Number(b.id);
  });
}

// --- Нормализация ответов: старые данные хранят ключи по НАЗВАНИЮ отдела,
//     новые — по числовому id. Приводим всё к id, чтобы читалось одинаково. ---
function deptIdByName(name){
  if(name==null) return null;
  let d=S.departments.find(x=>x.name===name);
  if(d) return d.id;
  const t=String(name).trim().toLowerCase();
  d=S.departments.find(x=>String(x.name).trim().toLowerCase()===t);
  return d?d.id:null;
}

function normalizeAnswers(answers){
  if(!answers || typeof answers!=='object') return {};
  const out={};
  Object.keys(answers).forEach(k=>{
    let id=null;
    if(/^\d+$/.test(String(k))) id=Number(k);
    else { const r=deptIdByName(k); if(r!=null) id=Number(r); }
    const key=(id!=null)?String(id):String(k);
    out[key]=answers[k];
  });
  return out;
}

function deptDisplayName(key){
  const d=S.departments.find(x=>String(x.id)===String(key));
  return d?d.name:String(key);
}

function periodsWithData(){
  const ids=new Set(S.responses.map(r=>Number(r.period_id)));
  return sortPeriods(S.periods).filter(p=>ids.has(Number(p.id)));
}

// Умно выбираем период для результатов и период для сравнения (предыдущий с данными)
function pickDefaultResultPeriods(){
  const curHasData = S.resultPeriodId && S.responses.some(r=>Number(r.period_id)===Number(S.resultPeriodId));
  if(!curHasData){
    const withData=periodsWithData();
    const active=getActivePeriod();
    const activeHasData = active && S.responses.some(r=>Number(r.period_id)===Number(active.id));
    const cur = activeHasData ? active : (withData.length?withData[withData.length-1]:active);
    if(cur) S.resultPeriodId=String(cur.id);
  }
  if(!S.comparePeriodId){
    const all=sortPeriods(S.periods);
    const idx=all.findIndex(p=>String(p.id)===String(S.resultPeriodId));
    for(let i=idx-1;i>=0;i--){
      if(S.responses.some(r=>Number(r.period_id)===Number(all[i].id))){ S.comparePeriodId=String(all[i].id); break; }
    }
  }
}

function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

// --- Рисуем графики на canvas → PNG (для вставки в Excel) ---
function _canvas(w,h){
  const c=document.createElement('canvas');
  c.width=w; c.height=h;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,w,h);
  return {c,ctx};
}

function makeLineChartPNG(title, labels, values){
  const W=860,H=380,padL=46,padR=24,padT=48,padB=54;
  const {c,ctx}=_canvas(W,H);
  ctx.fillStyle='#28251d'; ctx.font='bold 18px Arial'; ctx.textAlign='left';
  ctx.fillText(title, padL, 28);
  const plotW=W-padL-padR, plotH=H-padT-padB;
  ctx.strokeStyle='#e5e2db'; ctx.lineWidth=1; ctx.fillStyle='#7a7974'; ctx.font='12px Arial';
  for(let s=1;s<=5;s++){
    const y=padT+plotH-((s-1)/4)*plotH;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.textAlign='right'; ctx.fillText(String(s), padL-8, y+4);
  }
  const n=labels.length;
  const X=i=> n<=1? padL+plotW/2 : padL+(i/(n-1))*plotW;
  const Y=v=> padT+plotH-((v-1)/4)*plotH;
  ctx.strokeStyle='#1a1a18'; ctx.lineWidth=2.5; ctx.beginPath();
  let started=false;
  values.forEach((v,i)=>{ if(v==null) return; const px=X(i),py=Y(v); if(!started){ctx.moveTo(px,py);started=true;} else ctx.lineTo(px,py); });
  ctx.stroke();
  values.forEach((v,i)=>{ if(v==null) return; const px=X(i),py=Y(v);
    ctx.fillStyle='#1a1a18'; ctx.beginPath(); ctx.arc(px,py,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#28251d'; ctx.font='bold 12px Arial'; ctx.textAlign='center'; ctx.fillText(v.toFixed(2), px, py-10);
  });
  ctx.fillStyle='#7a7974'; ctx.font='12px Arial'; ctx.textAlign='center';
  labels.forEach((l,i)=>{ const t=l.length>16?l.slice(0,15)+'…':l; ctx.fillText(t, X(i), H-padB+22); });
  return c.toDataURL('image/png');
}

function makeBarChartPNG(title, labels, curr, prev, labelCurr, labelPrev){
  const n=labels.length;
  const W=Math.max(860, n*78+120), H=440, padL=46,padR=24,padT=58,padB=110;
  const {c,ctx}=_canvas(W,H);
  ctx.fillStyle='#28251d'; ctx.font='bold 18px Arial'; ctx.textAlign='left';
  ctx.fillText(title, padL, 28);
  // легенда
  ctx.fillStyle='#1a1a18'; ctx.fillRect(padL,38,14,14);
  ctx.fillStyle='#28251d'; ctx.font='12px Arial'; ctx.fillText(labelCurr, padL+20, 50);
  if(prev){ ctx.fillStyle='#c8a23a'; ctx.fillRect(padL+150,38,14,14); ctx.fillStyle='#28251d'; ctx.fillText(labelPrev, padL+170, 50); }
  const plotW=W-padL-padR, plotH=H-padT-padB;
  ctx.strokeStyle='#e5e2db'; ctx.fillStyle='#7a7974'; ctx.font='12px Arial';
  for(let s=1;s<=5;s++){
    const y=padT+plotH-((s-1)/4)*plotH;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.textAlign='right'; ctx.fillText(String(s), padL-8, y+4);
  }
  const slot=plotW/n;
  const Y=v=> padT+plotH-((v-1)/4)*plotH;
  labels.forEach((l,i)=>{
    const cx=padL+slot*i+slot/2;
    const bw=prev?Math.min(22,slot/3):Math.min(30,slot/2);
    const cv=curr[i], pv=prev?prev[i]:null;
    if(cv!=null){ const y=Y(cv); ctx.fillStyle='#1a1a18'; const x=prev?cx-bw-2:cx-bw/2; ctx.fillRect(x,y,bw,(padT+plotH)-y);
      ctx.fillStyle='#28251d'; ctx.font='bold 11px Arial'; ctx.textAlign='center'; ctx.fillText(cv.toFixed(2), x+bw/2, y-4); }
    if(pv!=null){ const y=Y(pv); ctx.fillStyle='#c8a23a'; const x=cx+2; ctx.fillRect(x,y,bw,(padT+plotH)-y);
      ctx.fillStyle='#7a6a1f'; ctx.font='bold 11px Arial'; ctx.textAlign='center'; ctx.fillText(pv.toFixed(2), x+bw/2, y-4); }
    // подпись отдела (повёрнута)
    ctx.save(); ctx.translate(cx, padT+plotH+12); ctx.rotate(-Math.PI/4);
    ctx.fillStyle='#5f5e5a'; ctx.font='11px Arial'; ctx.textAlign='right';
    const t=l.length>22?l.slice(0,21)+'…':l; ctx.fillText(t,0,0); ctx.restore();
  });
  return c.toDataURL('image/png');
}

// --- Встроенный SVG-график «текущий vs предыдущий» по критериям (в карточке отдела) ---
function renderCompareBarsSVG(curByQ, prevByQ){
  const W=520,H=180,padL=8,padR=8,padT=10,padB=46;
  const n=CRITERIA.length, plotH=H-padT-padB, slot=(W-padL-padR)/n;
  const Y=v=> padT+plotH-((v-1)/4)*plotH;
  let bars='';
  for(let i=0;i<n;i++){
    const cx=padL+slot*i+slot/2;
    const cv=curByQ[i]&&curByQ[i].avg, pv=prevByQ?(prevByQ[i]&&prevByQ[i].avg):null;
    const bw=prevByQ?14:20;
    if(cv!=null){ const y=Y(cv); const x=prevByQ?cx-bw-1:cx-bw/2;
      bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${(padT+plotH)-y}" fill="#1a1a18"></rect>`+
            `<text x="${x+bw/2}" y="${y-3}" font-size="10" text-anchor="middle" fill="#28251d">${cv.toFixed(2)}</text>`; }
    if(pv!=null){ const y=Y(pv); const x=cx+1;
      bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${(padT+plotH)-y}" fill="#c8a23a"></rect>`+
            `<text x="${x+bw/2}" y="${y-3}" font-size="10" text-anchor="middle" fill="#7a6a1f">${pv.toFixed(2)}</text>`; }
    bars+=`<text x="${cx}" y="${padT+plotH+16}" font-size="11" text-anchor="middle" fill="#7a7974">К${i+1}</text>`;
  }
  let grid='';
  for(let s=1;s<=5;s++){ const y=Y(s); grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#ece8e2"></line>`; }
  const legend=`<rect x="${padL}" y="${H-20}" width="12" height="12" fill="#1a1a18"></rect><text x="${padL+18}" y="${H-10}" font-size="11" fill="#5f5e5a">Текущий</text>`+
    (prevByQ?`<rect x="${padL+90}" y="${H-20}" width="12" height="12" fill="#c8a23a"></rect><text x="${padL+108}" y="${H-10}" font-size="11" fill="#5f5e5a">Сравнение</text>`:'');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${grid}${bars}${legend}</svg>`;
}

async function loadAll(){
  try{
    const [periods, departments, groups] = await Promise.all([
      sbGet('survey_periods', 'select=*&order=date_from.asc.nullslast,created_at.asc'),
      sbGet('departments', 'select=*&order=is_active.desc,name.asc'),
      sbGet('sv_groups_v2', 'select=*&order=created_at.asc'),
    ]);

    S.periods = periods;
    S.departments = departments;
    S.allGroups = groups;

    const active = getActivePeriod() || S.periods[0] || null;
    S.groups = active ? groups.filter(g=>Number(g.period_id)===Number(active.id)) : [];

    if(active){
      S.resultPeriodId = String(active.id);
      if(!S.newGroupPeriodId) S.newGroupPeriodId = String(active.id);
    }
  }catch(e){
    console.error(e);
  }

  S.loading=false;
  render();
}

async function loadResponses(){
  S.resultLoading=true;
  render();
  try{
    const rows = await sbGet('sv_responses_v2', 'select=*&order=created_at.asc');
    rows.forEach(r=>{ r.answers = normalizeAnswers(r.answers); });
    S.responses = rows;
    pickDefaultResultPeriods();
  }catch(e){
    console.error(e);
  }
  S.resultLoading=false;
  render();
}

function render(){
  document.getElementById('app').innerHTML = buildHtml();
}

function mkTab(id,label){
  return `<button class="tab${S.tab===id?' active':''}" onclick="setTab('${id}')">${label}</button>`;
}

function buildHtml(){
  if(!CONFIGURED){
    return `<div class="card"><div class="h1">Приложение не настроено</div><div class="muted">Вставьте значения SUPABASE_URL и SUPABASE_ANON_KEY в HTML-файл.</div></div>`;
  }

  if(S.loading){
    return `<div class="card"><div class="h1">Загрузка…</div><div class="muted">Подключение к данным опроса</div></div>`;
  }

  const active = getActivePeriod();

  return `
  <div class="topbar">
    <div>
      <div class="subtitle">ООО «СТИЛ ТЕХНОЛОДЖИ» · Оценка подразделений</div>
      <div class="title">Опрос компетенций подразделений</div>
    </div>
    <div>
      ${active ? `<span class="badge badge-info">Активный период: ${esc(active.name)}</span>` : `<span class="badge badge-warn">Нет активного периода</span>`}
    </div>
  </div>

  <div class="tabs">
    ${mkTab('survey','Пройти опрос')}
    ${S.adminAuth ? mkTab('results','Результаты') : ''}
    ${mkTab('admin',S.adminAuth?'Администрирование':'Войти')}
  </div>

  ${S.tab==='survey' ? renderSurvey() : S.tab==='results' ? renderResults() : renderAdmin()}
  `;

function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }

function calcDeptStats(responses, deptId){
  const byQ=CRITERIA.map((_,qi)=>{
    const scores=responses.flatMap(r=>{
      const da=r.answers && r.answers[String(deptId)];
      if(!da || !da[qi] || da[qi].score===0 || da[qi].score===null) return [];
      return [Number(da[qi].score)];
    });

    const na=responses.filter(r=>{
      const da=r.answers && r.answers[String(deptId)];
      return !!(da && da[qi] && Number(da[qi].score)===0);
    }).length;

    return {
      avg:scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:null,
      count:scores.length,
      na
    };
  });

  const vals=byQ.map(x=>x.avg).filter(v=>v!==null);
  const count=responses.filter(r=>r.answers && r.answers[String(deptId)]).length;
  return {avg:vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null,count,byQ};
}

function fmtDelta(v){
  if(v===null) return '—';
  const s=v>0?'+':'';
  return s+v.toFixed(2);
}

function deltaClass(v){
  if(v===null) return 'delta flat';
  if(v>0.001) return 'delta up';
  if(v<-0.001) return 'delta down';
  return 'delta flat';
}

function getDeptTrend(deptId){
  const points=sortPeriods(S.periods).map(p=>{
    const rs=S.responses.filter(r=>Number(r.period_id)===Number(p.id));
    const st=calcDeptStats(rs,deptId);
    return {label:p.name,value:st.avg,count:st.count};
  }).filter(x=>x.count && x.value!==null);

  return {
    points,
    firstLabel:points.length?points[0].label:'',
    lastLabel:points.length?points[points.length-1].label:''
  };
}

function renderSparkline(points){
  if(!points.length) return '';

  const width=520,height=56,pad=6;
  const vals=points.map(p=>Number(p.value));
  const min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
  const step=points.length===1?0:(width-pad*2)/(points.length-1);

  const coords=points.map((p,i)=>({
    x:pad+step*i,
    y:height-pad-((Number(p.value)-min)/span)*(height-pad*2),
    v:Number(p.value),
    label:p.label
  }));

  const poly=coords.map(c=>`${c.x},${c.y}`).join(' ');
  const last=coords[coords.length-1], first=coords[0];
  const area=`${pad},${height-pad} ${coords.map(c=>`${c.x},${c.y}`).join(' ')} ${last.x},${height-pad}`;
  const color=(last.v-first.v)>0.001?'#437a22':(last.v-first.v)<-0.001?'#b34b4b':'#7a7974';

  return `
  <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="Тренд">
    <polyline points="${area}" fill="rgba(1,105,111,0.08)"></polyline>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
    ${coords.map((c,i)=>`<circle cx="${c.x}" cy="${c.y}" r="${i===coords.length-1?3.5:2.5}" fill="${color}"><title>${esc(c.label)}: ${c.v.toFixed(2)}</title></circle>`).join('')}
  </svg>`;
}

function renderResults(){
  if(S.resultLoading) return `<div class="card"><div class="h1">Загрузка ответов…</div></div>`;

  const periods=sortPeriods(S.periods);
  const currentPeriodId=Number(S.resultPeriodId||0);
  const comparePeriodId=Number(S.comparePeriodId||0);

  const currentResponses=S.responses.filter(r=>Number(r.period_id)===currentPeriodId);
  const compareResponses=comparePeriodId?S.responses.filter(r=>Number(r.period_id)===comparePeriodId):[];

  const deptIds=[...new Set(S.responses.flatMap(r=>Object.keys(r.answers||{})))]
    .sort((a,b)=>deptDisplayName(a).localeCompare(deptDisplayName(b),'ru'));

  const stats=deptIds.map(deptId=>{
    const cur=calcDeptStats(currentResponses,deptId);
    const prev=comparePeriodId?calcDeptStats(compareResponses,deptId):null;
    return {
      deptId,
      cur,
      prev,
      delta:(cur.avg!==null && prev && prev.avg!==null)?cur.avg-prev.avg:null
    };
  }).filter(x => x.cur.count);

  const totalCurrent=currentResponses.length;
  const avgCurrent=avg(stats.map(x=>x.cur.avg).filter(v=>v!==null));
  const avgPrev=avg(stats.map(x=>x.prev && x.prev.avg!==null?x.prev.avg:null).filter(v=>v!==null));
  const overallDelta=(avgCurrent!==null && avgPrev!==null)?avgCurrent-avgPrev:null;
  const selKey=S.resultDeptId||'';

  return `
  <div class="card">
    <div class="grid grid-3" style="margin-bottom:16px">
      <div class="field">
        <label>Период</label>
        <select onchange="S.resultPeriodId=this.value;render()">
          ${periods.map(p=>`<option value="${p.id}" ${String(p.id)===String(S.resultPeriodId)?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Сравнить с</label>
        <select onchange="S.comparePeriodId=this.value;render()">
          <option value="">Без сравнения</option>
          ${periods.filter(p=>String(p.id)!==String(S.resultPeriodId)).map(p=>`<option value="${p.id}" ${String(p.id)===String(S.comparePeriodId)?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Действия</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-sm" onclick="loadResponses()">Обновить</button>
          <button class="btn-green btn-sm" onclick="exportExcel()">Excel</button>
        </div>
      </div>
    </div>

    <div class="grid grid-3">
      <div class="kpi"><div class="v">${totalCurrent}</div><div class="l">Ответов в периоде</div></div>
      <div class="kpi"><div class="v">${avgCurrent!==null?avgCurrent.toFixed(2):'—'}</div><div class="l">Средний балл</div></div>
      <div class="kpi"><div class="v ${deltaClass(overallDelta)}">${fmtDelta(overallDelta)}</div><div class="l">Дельта к периоду сравнения</div></div>
    </div>
  </div>

  <div class="card">
    <div class="h2">Сводка по подразделениям</div>
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr><th>Подразделение</th><th>Ответов</th><th>Средний</th><th>Δ</th></tr>
        </thead>
        <tbody>
          ${stats.length ? stats.sort((a,b)=>(b.cur.avg||0)-(a.cur.avg||0)).map(s=>{
            return `<tr onclick="selectDept(${JSON.stringify(String(s.deptId))})" style="cursor:pointer">
              <td>${esc(deptDisplayName(s.deptId))}</td>
              <td>${s.cur.count}</td>
              <td>${s.cur.avg!==null?s.cur.avg.toFixed(2):'—'}</td>
              <td><span class="${deltaClass(s.delta)}">${fmtDelta(s.delta)}</span></td>
            </tr>`;
          }).join('') : `<tr><td colspan="4" class="muted">Нет данных за выбранный период</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>

  ${selKey?renderDeptDetails(selKey,currentResponses,compareResponses):''}
  `;
}

function renderDeptDetails(deptId,currentResponses,compareResponses){
  const cur=calcDeptStats(currentResponses,deptId);
  const prev=compareResponses.length?calcDeptStats(compareResponses,deptId):null;
  const trend=getDeptTrend(deptId);

  const comments=currentResponses.flatMap(r=>{
    const da=r.answers && r.answers[String(deptId)];
    if(da && da[4] && da[4].text) return [{text:da[4].text,date:r.created_at?r.created_at.slice(0,10):''}];
    return [];
  });

  return `
  <div class="card">
    <div class="h2">${esc(deptDisplayName(deptId))}</div>
    <div class="muted" style="margin-bottom:12px">Ответов: ${cur.count}</div>

    ${trend.points.length?`
      <div class="sep"></div>
      <div class="h2">Динамика по периодам</div>
      <div class="spark-wrap">
        ${renderSparkline(trend.points)}
        <div class="spark-meta">
          <span>${esc(trend.firstLabel)}</span>
          <span>${esc(trend.lastLabel)}</span>
        </div>
      </div>`:''}

    <div class="sep"></div>
    <div class="h2">Баллы по критериям${prev?' — текущий и сравнение':''}</div>
    ${renderCompareBarsSVG(cur.byQ, prev?prev.byQ:null)}

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr><th>Критерий</th><th>Текущий</th><th>Сравнение</th><th>Δ</th></tr>
        </thead>
        <tbody>
          ${CRITERIA.map((c,qi)=>{
            const c1=cur.byQ[qi];
            const c2=prev?prev.byQ[qi]:null;
            const d=(c1.avg!==null && c2 && c2.avg!==null)?c1.avg-c2.avg:null;
            return `<tr>
              <td>${esc(c)}</td>
              <td>${c1.avg!==null?c1.avg.toFixed(2):'—'} <span class="small muted">(${c1.count}${c1.na?`, не взаимодействую: ${c1.na}`:''})</span></td>
              <td>${c2 && c2.avg!==null?c2.avg.toFixed(2):'—'}</td>
              <td><span class="${deltaClass(d)}">${fmtDelta(d)}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    ${comments.length?`
      <div class="sep"></div>
      <div class="h2">Пожелания и рекомендации</div>
      <div class="list">
        ${comments.map(c=>`<div class="row"><div>${esc(c.text)}</div><div class="muted">${esc(c.date)}</div></div>`).join('')}
      </div>`:''}
  </div>`;
}

window.submitCode=function(){

  if(!active){
    S.surveyMsg='Нет активного периода';
    render();
    return;
  }

  const code=S.code.trim().toUpperCase();
  const g=S.groups.find(x=>x.code===code);

  if(!g){
    S.surveyMsg='Группа с таким кодом не найдена в активном периоде';
    render();
    return;
  }

  if(isDone(code,g.period_id)){
    S.surveyMsg='Вы уже проходили опрос по этому коду в активном периоде';
    render();
    return;
  }

  S.currentGroup=g;
  S.deptIdx=0;
  S.answers={};
  S.step=1;
  S.surveyMsg='';
  render();
};

window.setScore=function(deptId,qi,score){
  if(!S.answers[deptId]) S.answers[deptId]={};
  if(!S.answers[deptId][qi]) S.answers[deptId][qi]={score:null,text:''};
  S.answers[deptId][qi].score=score;
  S.surveyMsg='';
  render();
};

window.setText=function(deptId,qi,text){
  if(!S.answers[deptId]) S.answers[deptId]={};
  if(!S.answers[deptId][qi]) S.answers[deptId][qi]={score:null,text:''};
  S.answers[deptId][qi].text=text;
};

function validateDeptAnswers(){
  const g=S.currentGroup;
  const deptId=g.dept_ids[S.deptIdx];

  for(let qi=0;qi<CRITERIA.length;qi++){
    const a=S.answers[deptId]?.[qi];
    if(!a || a.score===null){
      S.surveyMsg=`Ответьте на вопрос ${qi+1}`;
      render();
      return false;
    }
  }

  const fb=S.answers[deptId]?.[4];
  if(!fb || !fb.text || !fb.text.trim()){
    S.surveyMsg='Заполните поле «Пожелания и рекомендации»';
    render();
    return false;
  }

  S.surveyMsg='';
  return true;
}

window.nextDept=function(){
  if(!validateDeptAnswers()) return;
  S.deptIdx++;
  render();
  window.scrollTo(0,0);
};

window.prevDept=function(){
  S.deptIdx--;
  render();
  window.scrollTo(0,0);
};

window.submitSurvey=async function(){
  if(!validateDeptAnswers()) return;
  S.saving=true;
  render();

  try{
    await sbInsert('sv_responses_v2',{
      period_id:S.currentGroup.period_id,
      group_code:S.currentGroup.code,
      group_name:S.currentGroup.name,
      answers:S.answers
    });

    markDone(S.currentGroup.code,S.currentGroup.period_id);
    S.saving=false;
    S.step=2;
    render();
  }catch(e){
    console.error(e);
    S.saving=false;
    S.surveyMsg='Ошибка сохранения';
    render();
  }
};

window.checkPass=function(){
  const p=document.getElementById('passInput').value;
  if(p===ADMIN_PASS){
    S.adminAuth=true;
    S.adminErr='';
    S.tab='admin';
    render();
  } else {
    S.adminErr='Неверный пароль';
    render();
  }
};

window.logoutAdmin=function(){
  S.adminAuth=false;
  S.tab='survey';
  render();
};

    await sbPatch('survey_periods','id=neq.0',{is_active:false});

    S.resultPeriodId=String(id);
    S.newGroupPeriodId=String(id);
    await loadAll();
    await loadResponses();
    S.adminMsg='Активный период обновлён';
    render();
  }catch(e){
    alert(e.message);
  }
};

window.createPeriod=async function(){

  const date_from=document.getElementById('periodFrom').value || null;
  const date_to=document.getElementById('periodTo').value || null;

  try{
    await sbInsert('survey_periods',{name,code,date_from,date_to,is_active:false});
    await loadAll();
    S.adminMsg=`Период «${name}» создан`;

    alert(e.message);

window.createDepartment=async function(){
  if(!S.newDeptName.trim()) return alert('Введите название отдела');
  try{
    await sbInsert('departments',{name:S.newDeptName.trim(),is_active:true});
    S.newDeptName='';
    await loadAll();
    S.adminMsg='Отдел добавлен';
    render();
  }catch(e){
    alert(e.message);
  }
};

window.renameDepartment=async function(id,value){

  try{
    await sbPatch('departments',`id=eq.${id}`,{name});
    await loadAll();
    S.adminMsg='Название отдела обновлено';
    render();
  }catch(e){
    alert(e.message);
  }
};

window.toggleDepartment=async function(id,flag){
  try{
    await sbPatch('departments',`id=eq.${id}`,{is_active:flag});
    await loadAll();
    S.adminMsg=flag?'Отдел включён':'Отдел скрыт';

window.toggleDeptPick=function(id){
  const i=S.newGroupDeptIds.indexOf(id);
  if(i===-1) S.newGroupDeptIds.push(id);
  else S.newGroupDeptIds.splice(i,1);
  render();

window.createGroup=async function(){
  const name=S.newGroupName.trim();
  const periodId=Number(S.newGroupPeriodId||0);

  if(!name) return alert('Введите название');
  if(!periodId) return alert('Выберите период');
  if(!S.newGroupDeptIds.length) return alert('Выберите отделы');

  const code=genCode();

  try{
    await sbInsert('sv_groups_v2',{
      code,
      name,
      period_id:periodId,
      dept_ids:S.newGroupDeptIds,
      updated_at:new Date().toISOString()
    });

    S.newGroupName='';
    S.newGroupDeptIds=[];
    await loadAll();
    S.adminMsg=`Группа создана. Код: ${code}`;
    render();
  }catch(e){
    alert(e.message);
  }
};

window.copyGroupsFromPreviousPeriod=async function(){
  const active=getActivePeriod();
  if(!active) return alert('Нет активного периода');

  const periods=sortPeriods(S.periods).filter(p=>p.date_from);
  const idx=periods.findIndex(p=>Number(p.id)===Number(active.id));
  if(idx<=0) return alert('Нет предыдущего периода');

  const prev=periods[idx-1];
  const prevGroups=S.allGroups.filter(g=>Number(g.period_id)===Number(prev.id));
  const activeGroups=S.allGroups.filter(g=>Number(g.period_id)===Number(active.id));

  if(!prevGroups.length) return alert('В предыдущем периоде нет групп');

  if(activeGroups.length && !confirm(`В активном периоде уже есть ${activeGroups.length} групп. Копировать только недостающие?`)) return;

  try{
    for(const g of prevGroups){
      const exists=activeGroups.find(x=>x.name===g.name);
      if(exists) continue;

      await sbInsert('sv_groups_v2',{
        code:genCode(),
        name:g.name,
        period_id:active.id,
        dept_ids:g.dept_ids,
        updated_at:new Date().toISOString()
      });
    }

    await loadAll();
    S.adminMsg=`Группы из «${prev.name}» скопированы в «${active.name}»`;
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.clearActivePeriodResponses=async function(){
  const active=getActivePeriod();
  if(!active) return alert('Нет активного периода');
  if(!confirm(`Удалить ответы только периода «${active.name}»?`)) return;

  try{
    await sbDelete('sv_responses_v2',`period_id=eq.${active.id}`);
    const removed=clearSurveyLocalMarks();
    await loadAll();
    await loadResponses();
    S.adminMsg=`Ответы периода «${active.name}» очищены. Локальных меток удалено: ${removed}`;
    render();
  }catch(e){
    alert('Ошибка: ' + e.message);
  }
};

window.selectDept=function(id){

};

window.clearLocalMarksOnly=function(){
  const removed=clearSurveyLocalMarks();
  S.adminMsg=`Локальных меток очищено: ${removed}`;
  render();
};

window.exportExcel=async function(){
  try{
    if(typeof ExcelJS==='undefined') return alert('Библиотека ExcelJS не загружена (нет интернета или CDN заблокирован)');
    if(!S.responses.length) return alert('Нет данных для экспорта');

    const wb=new ExcelJS.Workbook();
    wb.creator='Опрос КПЭ';
    const allPeriods=sortPeriods(S.periods);
    const wd=periodsWithData();
    const deptIds=[...new Set(S.responses.flatMap(r=>Object.keys(r.answers||{})))]
      .sort((a,b)=>deptDisplayName(a).localeCompare(deptDisplayName(b),'ru'));
    const respOf=pid=>S.responses.filter(r=>Number(r.period_id)===Number(pid));
    const companyAvg=pid=>{
      const rs=respOf(pid);
      const vals=deptIds.map(d=>calcDeptStats(rs,d)).filter(s=>s.count&&s.avg!=null).map(s=>s.avg);
      return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    };

    const HEAD_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A1A18'}};
    const styleHeader=row=>row.eachCell(c=>{c.font={bold:true,color:{argb:'FFFFFFFF'}};c.fill=HEAD_FILL;c.alignment={vertical:'middle',horizontal:'center',wrapText:true};});
    const colorDelta=(cell,v)=>{ if(v===''||v==null) return; cell.font={bold:true,color:{argb: v>0?'FF2E7D32': v<0?'FFB23B3B':'FF7A7974'}}; };

    // ---------- Лист 1: Сводка (текущий vs предыдущий) ----------
    const ws=wb.addWorksheet('Сводка');
    ws.columns=[
      {header:'Период',width:22},{header:'Подразделение',width:42},{header:'Ответов',width:9},
      {header:'Средний (тек.)',width:13},{header:'Средний (пред.)',width:14},{header:'Δ',width:8},
      ...CRITERIA.map((c,i)=>({header:'К'+(i+1),width:8}))
    ];
    styleHeader(ws.getRow(1));
    wd.forEach((p,idx)=>{
      const cur=respOf(p.id);
      const prevP=idx>0?wd[idx-1]:null;
      const prevR=prevP?respOf(prevP.id):[];
      deptIds.forEach(d=>{
        const st=calcDeptStats(cur,d); if(!st.count) return;
        const pst=prevP?calcDeptStats(prevR,d):null;
        const delta=(pst&&st.avg!=null&&pst.avg!=null)?+(st.avg-pst.avg).toFixed(2):'';
        const row=ws.addRow([
          p.name, deptDisplayName(d), st.count,
          st.avg!=null?+st.avg.toFixed(2):'',
          pst&&pst.avg!=null?+pst.avg.toFixed(2):'',
          delta,
          ...st.byQ.map(x=>x.avg!=null?+x.avg.toFixed(2):'')
        ]);
        colorDelta(row.getCell(6),delta===''?null:delta);
      });
    });
    ws.views=[{state:'frozen',ySplit:1}];
    ws.eachRow(r=>r.eachCell(c=>{c.border={bottom:{style:'thin',color:{argb:'FFE5E2DB'}}};}));

    // ---------- Лист 2: Динамика (матрица отдел × квартал) ----------
    const wd2=wb.addWorksheet('Динамика');
    wd2.columns=[{header:'Подразделение',width:42}, ...wd.map(p=>({header:p.name,width:16})), {header:'Δ (посл.-пред.)',width:16}];
    styleHeader(wd2.getRow(1));
    deptIds.forEach(d=>{
      const series=wd.map(p=>{ const s=calcDeptStats(respOf(p.id),d); return s.count&&s.avg!=null?+s.avg.toFixed(2):''; });
      const lastTwo=series.filter(v=>v!=='');
      const delta=(series.length>=2 && series[series.length-1]!=='' && series[series.length-2]!=='')
        ? +(series[series.length-1]-series[series.length-2]).toFixed(2):'';
      const row=wd2.addRow([deptDisplayName(d), ...series, delta]);
      colorDelta(row.getCell(wd.length+2), delta===''?null:delta);
    });
    // строка «Итого по компании»
    const totalRow=wd2.addRow(['ИТОГО по компании', ...wd.map(p=>{const a=companyAvg(p.id);return a!=null?+a.toFixed(2):'';}), '']);
    totalRow.eachCell(c=>{c.font={bold:true};});

    // ---------- Лист 3: Комментарии ----------
    const wc=wb.addWorksheet('Комментарии');
    wc.columns=[{header:'Период',width:22},{header:'Подразделение',width:42},{header:'Комментарий',width:70},{header:'Дата',width:12}];
    styleHeader(wc.getRow(1));
    S.responses.forEach(r=>{
      Object.keys(r.answers||{}).forEach(k=>{
        const a=r.answers[k]&&r.answers[k][4];
        if(a&&a.text){
          const p=getPeriodById(r.period_id);
          const row=wc.addRow([p?p.name:'', deptDisplayName(k), a.text, r.created_at?r.created_at.slice(0,10):'']);
          row.getCell(3).alignment={wrapText:true,vertical:'top'};
        }
      });
    });

    // ---------- Лист 4: Графики (картинки) ----------
    try{
      const wg=wb.addWorksheet('Графики');
      // 1) Тренд среднего по компании
      const trendLabels=wd.map(p=>p.name);
      const trendVals=wd.map(p=>{const a=companyAvg(p.id);return a!=null?+a.toFixed(2):null;});
      if(trendLabels.length){
        const png=makeLineChartPNG('Средний балл по компании', trendLabels, trendVals);
        const id1=wb.addImage({base64:png.split(',')[1],extension:'png'});
        wg.addImage(id1,{tl:{col:0,row:1},ext:{width:860,height:380}});
      }
      // 2) Текущий vs предыдущий квартал по отделам
      if(wd.length>=1){
        const curP=wd[wd.length-1], prevP=wd.length>=2?wd[wd.length-2]:null;
        const curR=respOf(curP.id), prevR=prevP?respOf(prevP.id):[];
        const labels=[], curr=[], prev=[];
        deptIds.forEach(d=>{
          const cs=calcDeptStats(curR,d); if(!cs.count) return;
          const ps=prevP?calcDeptStats(prevR,d):null;
          labels.push(deptDisplayName(d)); curr.push(cs.avg!=null?+cs.avg.toFixed(2):null);
          prev.push(ps&&ps.avg!=null?+ps.avg.toFixed(2):null);
        });
        if(labels.length){
          const title=prevP?`${curP.name} vs ${prevP.name} по подразделениям`:`${curP.name} по подразделениям`;
          const png2=makeBarChartPNG(title, labels, curr, prevP?prev:null, curP.name, prevP?prevP.name:'');
          const id2=wb.addImage({base64:png2.split(',')[1],extension:'png'});
          wg.addImage(id2,{tl:{col:0,row:22},ext:{width:Math.max(860,labels.length*78+120),height:440}});
        }
      }
    }catch(chErr){ console.warn('Графики не добавлены:', chErr); }

    const buf=await wb.xlsx.writeBuffer();
    downloadBlob(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),
      `KPE-survey-${new Date().toISOString().slice(0,10)}.xlsx`);
  }catch(e){
    console.error(e);
    alert('Ошибка экспорта: ' + e.message);
  }
};

loadAll().then(loadResponses);
</script>
